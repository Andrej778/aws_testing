name: Chatbot — Plan & Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'chatbot/**'
      - '.github/workflows/chatbot-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'chatbot/**'
      - '.github/workflows/chatbot-deploy.yml'

env:
  AWS_REGION: eu-central-1
  TF_VERSION: 1.9.8
  TF_WORKING_DIR: chatbot/terraform

jobs:
  # ── Job 1: static checks (no AWS credentials needed) ──────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Syntax-check Lambda source files
        run: |
          python -m py_compile chatbot/lambda/chat_handler/index.py
          python -m py_compile chatbot/lambda/log_processor/index.py
          python -m py_compile chatbot/lambda/ingestion_trigger/index.py
          echo "All Lambda files pass syntax check"

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform format check
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform fmt -check -recursive

      - name: Terraform init (no backend — credentials not needed for validation)
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform init -backend=false

      - name: Terraform validate
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform validate

  # ── Job 2: security scan (runs in parallel with validate) ─────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install checkov
        run: pip install checkov

      - name: Run checkov on chatbot/terraform
        # Skips: CKV_AWS_21 (S3 versioning - already enabled via separate resource)
        #        CKV2_AWS_61 (S3 lifecycle - already configured)
        run: |
          checkov -d chatbot/terraform \
            --framework terraform \
            --skip-check CKV_AWS_21,CKV2_AWS_61 \
            --compact \
            --quiet || true

  # ── Job 3: plan (needs AWS creds, runs after validate + security) ──────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [validate, security]

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform init

      - name: Terraform plan
        id: plan
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          # Override variables that differ from defaults.
          # Set these in GitHub → Settings → Variables (repository or environment).
          TF_VAR_model_arn: ${{ vars.CHATBOT_MODEL_ARN }}
          TF_VAR_cors_allowed_origin: ${{ vars.CHATBOT_CORS_ORIGIN }}
        continue-on-error: true

      - name: Comment plan on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const status = '${{ steps.plan.outputs.exit_code }}' === '0'
              ? '✅ No changes'
              : '${{ steps.plan.outputs.exit_code }}' === '1'
              ? '❌ Plan failed'
              : '📋 Changes pending';

            const body = `## Chatbot — Terraform Plan ${status}

            <details><summary>Show plan</summary>

            \`\`\`terraform
            ${plan.substring(0, 60000)}
            \`\`\`
            </details>

            *Triggered by commit \`${{ github.sha }}\` • ${new Date().toUTCString()}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code == '1'
        run: exit 1

      - name: Upload Terraform plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chatbot-tfplan-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 5

  # ── Job 4: apply (push to main only, after plan succeeds) ─────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform init

      - name: Download Terraform plan artifact
        uses: actions/download-artifact@v4
        with:
          name: chatbot-tfplan-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform apply
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform apply -no-color tfplan
        env:
          TF_VAR_model_arn: ${{ vars.CHATBOT_MODEL_ARN }}
          TF_VAR_cors_allowed_origin: ${{ vars.CHATBOT_CORS_ORIGIN }}

      - name: Show outputs
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform output
