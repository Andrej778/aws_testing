name: Chatbot — Plan & Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'chatbot/**'
      - '.github/workflows/chatbot-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'chatbot/**'
      - '.github/workflows/chatbot-deploy.yml'

env:
  AWS_REGION: eu-central-1
  TF_VERSION: 1.9.8
  TF_WORKING_DIR: chatbot/terraform

jobs:
  # ── Job 1: static checks — no AWS credentials needed ──────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Syntax-check Lambda source files
        run: |
          python -m py_compile chatbot/lambda/chat_handler/index.py
          python -m py_compile chatbot/lambda/log_processor/index.py
          python -m py_compile chatbot/lambda/ingestion_trigger/index.py
          echo "All Lambda files pass syntax check"

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform format check
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform fmt -check -recursive

      - name: Terraform init (no backend — credentials not needed for validation)
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform init -backend=false

      - name: Terraform validate
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform validate

  # ── Job 2: security scan — runs in parallel with validate ─────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install checkov
        run: pip install checkov

      - name: Run checkov on chatbot/terraform
        # Skips: CKV_AWS_21 (S3 versioning — already enabled via separate resource)
        #        CKV2_AWS_61 (S3 lifecycle  — already configured)
        run: |
          checkov -d chatbot/terraform \
            --framework terraform \
            --skip-check CKV_AWS_21,CKV2_AWS_61 \
            --compact \
            --quiet || true

  # ── Job 3: plan + apply — single job to avoid provider hash mismatch ───────
  #
  # Why one job instead of separate plan/apply jobs:
  # Splitting plan and apply across jobs requires uploading the tfplan file as
  # an artifact and re-running `terraform init` in the apply job. Each fresh
  # `terraform init` re-downloads provider binaries whose SHA256 hashes may
  # differ from the ones recorded in the plan file, causing Terraform to reject
  # the plan with "Cannot apply incomplete plan." Running both steps in the same
  # job on the same runner eliminates this entirely.
  #
  # Behaviour:
  #   pull_request → plan only, post plan output as PR comment
  #   push to main → plan then apply immediately in the same shell context
  deploy:
    name: Plan & Apply
    runs-on: ubuntu-latest
    needs: [validate, security]

    permissions:
      contents: read
      pull-requests: write

    environment: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && 'production' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform init

      # ── Plan ──────────────────────────────────────────────────────────────
      - name: Terraform plan
        id: plan
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          set +e
          terraform plan -no-color -detailed-exitcode -out=tfplan 2>&1 | tee plan_output.txt
          TF_EXIT=${PIPESTATUS[0]}
          echo "exit_code=${TF_EXIT}" >> $GITHUB_OUTPUT
          # 0 = no changes, 1 = error, 2 = changes present — all valid here
          exit 0
        env:
          TF_VAR_model_arn: ${{ vars.CHATBOT_MODEL_ARN }}
          TF_VAR_cors_allowed_origin: ${{ vars.CHATBOT_CORS_ORIGIN }}

      # ── Post plan output as PR comment ────────────────────────────────────
      - name: Comment plan on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan  = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const code  = '${{ steps.plan.outputs.exit_code }}';
            const label = code === '0' ? '✅ No changes'
                        : code === '1' ? '❌ Plan errored'
                        :                '📋 Changes pending';

            const body = `## Chatbot — Terraform Plan ${label}

            <details><summary>Show plan output</summary>

            \`\`\`hcl
            ${plan.substring(0, 60000)}
            \`\`\`
            </details>

            *Commit \`${{ github.sha }}\` · ${new Date().toUTCString()}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # ── Hard-fail if plan errored (exit 1) ────────────────────────────────
      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "terraform plan exited with error. See plan output above."
          exit 1

      # ── Apply — only on push to main, immediately after the plan above ────
      # Using the same tfplan file produced moments ago in this same job/runner,
      # so provider binaries and state are identical — no hash mismatch possible.
      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.plan.outputs.exit_code != '1'
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform apply -no-color tfplan
        env:
          TF_VAR_model_arn: ${{ vars.CHATBOT_MODEL_ARN }}
          TF_VAR_cors_allowed_origin: ${{ vars.CHATBOT_CORS_ORIGIN }}

      - name: Show outputs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.plan.outputs.exit_code != '1'
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform output
