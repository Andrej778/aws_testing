name: Terraform Deploy to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'

env:
  AWS_REGION: eu-central-1
  TERRAFORM_VERSION: 1.5.0

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        id: fmt
        run: |
          cd terraform
          terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          cd terraform
          terraform init

      - name: Bootstrap IAM Policy
        id: bootstrap
        run: |
          cd terraform
          # Try to apply the IAM bootstrap policy first
          # This may fail if deploy-user doesn't have IAM permissions yet
          # If it fails, the policy needs to be created manually
          terraform apply -target=aws_iam_policy.terraform_deploy -target=aws_iam_user_policy_attachment.deploy_user_attach -auto-approve || echo "IAM bootstrap skipped - policy may already exist or user lacks IAM permissions"
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: |
          cd terraform
          terraform validate

      - name: Terraform Plan
        id: plan
        continue-on-error: true
        run: |
          cd terraform
          terraform plan -no-color -detailed-exitcode -out=tfplan 2>&1 | tee plan_output.txt

      - name: Print plan output
        if: always()
        run: cat terraform/plan_output.txt

      - name: Comment Plan on Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const code = '${{ steps.plan.outputs.exitcode }}';
            const label = code === '0' ? '✅ No changes'
                        : code === '1' ? '❌ Plan errored'
                        :                '📋 Changes pending';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Root Terraform Plan ${label}\n\n<details><summary>Show plan output</summary>\n\n\`\`\`hcl\n${plan.substring(0, 60000)}\n\`\`\`\n</details>\n\n*Commit \`${{ github.sha }}\`*`
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "terraform plan exited with error. See plan output above."
          exit 1

      # exitcode == '2' means plan succeeded with changes (see chatbot-deploy.yml for rationale)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.plan.outputs.exitcode == '2'
        id: apply
        run: |
          cd terraform
          terraform apply -no-color tfplan

      - name: Terraform Output
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.plan.outputs.exitcode == '2'
        run: |
          cd terraform
          terraform output

      - name: Upload Terraform Plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
          retention-days: 5

  validation:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Install tflint
        run: |
          curl https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Run tflint
        run: |
          cd terraform
          tflint --init
          tflint --format compact

      - name: Install checkov
        run: |
          pip install checkov

      - name: Run checkov security scan
        run: |
          checkov -d terraform --framework terraform --skip-check CKV_AWS_21 || true
